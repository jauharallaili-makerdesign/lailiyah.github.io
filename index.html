<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMA KAMU | Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #0a0a0f;
  color: #fff;
  overflow-x: hidden;
}

/* Background gradient animasi */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 20%, rgba(139, 92, 246, 0.3), transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.3), transparent 50%);
  animation: move 20s ease infinite;
  z-index: -1;
}

@keyframes move {
 0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(50px, 50px); }
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Badge atas */
.badge {
  display: inline-block;
  padding: 8px 20px;
  background: rgba(139, 92, 246, 0.1);
  border: 1px solid rgba(139, 92, 246, 0.3);
  border-radius: 50px;
  font-size: 12px;
  letter-spacing: 2px;
  color: #a78bfa;
  backdrop-filter: blur(10px);
  margin-bottom: 30px;
  animation: fadeUp 0.8s ease;
}

/* Judul besar */
h1 {
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 20px;
  animation: fadeUp 1s ease 0.2s both;
}

h1 span {
  background: linear-gradient(90deg, #8b5cf6, #3b82f6, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Deskripsi */
p.desc {
  font-size: 18px;
  color: #a1a1aa;
  max-width: 600px;
  line-height: 1.6;
  margin-bottom: 40px;
  animation: fadeUp 1s ease 0.4s both;
}

/* Tombol */
.btn-group {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  animation: fadeUp 1s ease 0.6s both;
}

.btn {
  padding: 14px 32px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(90deg, #8b5cf6, #3b82f6);
  color: white;
  border: none;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
}

.btn-secondary {
  background: transparent;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(255, 255, 255, 0.1);
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 768px) {
  h1 { font-size: 48px; }
  p.desc { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="badge">CREATIVE PROFESSIONAL • BASED IN INDONESIA</div>
  
  <h1>
    Design.<br>
    Edit.<br>
    <span>Create.</span>
  </h1>
  
  <p class="desc">
    Graphic designer, video editor, dan AI artist yang siap mengubah ide kamu menjadi visual yang keren dan berkesan.
  </p>
  
  <div class="btn-group">
    <a href="#portfolio" class="btn btn-primary">Lihat Portofolio →</a>
    <a href="https://wa.me/628xxxxxxxxxx" class="btn btn-secondary">Hire Me</a>
  </div>
</div>

</body>
  </html>
